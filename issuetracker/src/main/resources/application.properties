spring.application.name=mini-saas
server.port=8080

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/mydb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=appuser
spring.datasource.password=469676
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Execute schema.sql (for triggers/procedures) on startup
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true
spring.sql.init.separator=//
spring.jpa.defer-datasource-initialization=true

# Security configuration will be handled in SecurityConfig.java
