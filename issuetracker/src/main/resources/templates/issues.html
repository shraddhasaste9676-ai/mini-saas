<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Issue Tracker</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header>
        <div class="header-content">
            <h1>Issue Tracker</h1>
            <div class="header-links">
                <a href="/">Home</a>
                <a href="/issues">Issues</a>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="topbar">
            <h2>All Issues</h2>
            <a href="/issues/create" class="btn-link">+ Create Issue</a>
        </div>

        <div class="issue-list">
            <!-- Issues will be displayed here -->
            <div class="issue-item">
                <div class="issue-content">
                    <div class="issue-title">Sample Issue Title</div>
                    <div class="issue-description">This is a sample issue description that explains the problem.</div>
                    <div class="issue-meta">Created on: 2026-04-26 | ID: #1</div>
                </div>
                <div class="issue-actions">
                    <span class="status open">OPEN</span>
                    <a href="/issues/1/edit" class="btn-edit">Edit</a>
                    <a href="/issues/1/delete" class="btn-delete">Delete</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
