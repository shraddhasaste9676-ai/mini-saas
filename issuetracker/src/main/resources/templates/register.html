<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register - Issue Tracker</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body style="display: flex; justify-content: center; align-items: center; min-height: 100vh;">
<div class="container" style="max-width: 400px;">
    <div class="form-card">
        <h2 style="text-align: center; margin-bottom: 2rem;">Register</h2>

        <p th:if="${error}" th:text="${error}" style="color: #ef4444; margin-bottom: 1rem;"></p>

        <form th:action="@{/register}" th:object="${registerRequest}" method="post">
            <div class="form-group">
                <label>Name</label>
                <input type="text" th:field="*{name}" class="form-control" placeholder="Name" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" th:field="*{email}" class="form-control" placeholder="Email" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" th:field="*{password}" class="form-control" placeholder="Password" required>
            </div>
            <button type="submit" class="btn" style="width: 100%; margin-top: 1rem;">Register</button>
        </form>

        <p style="text-align: center; margin-top: 1.5rem;"><a th:href="@{/login}" style="color: var(--primary-color);">Already have an account? Login</a></p>
    </div>
</div>
</body>
</html>
