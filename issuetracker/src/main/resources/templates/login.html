<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login - Issue Tracker</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body style="display: flex; justify-content: center; align-items: center; min-height: 100vh;">
<div class="container" style="max-width: 400px;">
    <div class="form-card">
        <h2 style="text-align: center; margin-bottom: 2rem;">Login to IssueTracker</h2>
        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label>Email</label>
                <input type="text" name="username" class="form-control" placeholder="Email" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" class="form-control" placeholder="Password" required>
            </div>
            <button type="submit" class="btn" style="width: 100%; margin-top: 1rem;">Login</button>
        </form>
        <p style="text-align: center; margin-top: 1.5rem;"><a th:href="@{/register}" style="color: var(--primary-color);">Create account</a></p>
    </div>
</div>
</body>
</html>
