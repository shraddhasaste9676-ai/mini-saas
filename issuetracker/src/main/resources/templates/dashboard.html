<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Dashboard - Issue Tracker</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container">
    <div class="topbar">
        <h2>Issue Tracker Dashboard</h2>
        <form th:action="@{/logout}" method="post">
            <button type="submit" class="logout-btn">Logout</button>
        </form>
    </div>

    <div class="card-grid">
        <a class="card" th:href="@{/issues}">View Issues</a>
        <a class="card" th:href="@{/issues/new}">Create Issue</a>
    </div>
</div>
</body>
</html>
