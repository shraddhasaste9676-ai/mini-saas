<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Issue | Mini SaaS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
    <header>
        <h1>IssueTracker</h1>
        <nav>
            <a th:href="@{/board}">Board</a>
            <form th:action="@{/logout}" method="post" style="display:inline;">
                <button type="submit" class="btn btn-secondary" style="padding: 0.25rem 0.75rem; font-size: 0.875rem;">Logout</button>
            </form>
        </nav>
    </header>

    <div class="container">
        <div class="form-card">
            <h2 style="margin-bottom: 1.5rem;">Create New Issue</h2>
            <form th:action="@{/issue/new}" method="post">
                <div class="form-group">
                    <label for="title">Title</label>
                    <input type="text" id="title" name="title" class="form-control" required placeholder="What needs to be done?">
                </div>
                
                <div class="form-group">
                    <label for="description">Description</label>
                    <textarea id="description" name="description" class="form-control" rows="5" placeholder="Add more details..."></textarea>
                </div>

                <div class="form-group">
                    <label for="assignedToId">Assignee</label>
                    <select id="assignedToId" name="assignedToId" class="form-control">
                        <option value="">Unassigned</option>
                        <option th:each="user : ${users}" th:value="${user.id}" th:text="${user.name}"></option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="status">Initial Status</label>
                    <select id="status" name="status" class="form-control">
                        <option value="TO_DO">To Do</option>
                        <option value="IN_PROGRESS">In Progress</option>
                        <option value="IN_REVIEW">In Review</option>
                        <option value="DONE">Done</option>
                    </select>
                </div>

                <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                    <button type="submit" class="btn" style="flex: 1;">Create Issue</button>
                    <a th:href="@{/board}" class="btn btn-secondary" style="text-align: center;">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
